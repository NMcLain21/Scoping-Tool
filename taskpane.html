<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Scoping Tool</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css"/>
</head>
<body>
<div id="app">

  <!-- ── App header ───────────────────────────────────────── -->
  <header id="app-header">
    <div class="header-wordmark">
      <div class="header-logo-dot"></div>
      <span class="header-title">Scoping Tool</span>
    </div>
    <span class="header-sub">APi Group</span>
  </header>

  <!-- ══════════ MAIN CONTENT ══════════ -->
  <div id="main-content">

    <!-- Empty state -->
    <div id="empty-state">
      <svg class="empty-illustration" width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="6" y="6" width="36" height="36" rx="4" stroke="#CBD2E0" stroke-width="2"/>
        <rect x="13" y="13" width="10" height="10" rx="2" stroke="#CBD2E0" stroke-width="1.5"/>
        <rect x="13" y="27" width="22" height="4" rx="2" fill="#CBD2E0" opacity=".5"/>
        <rect x="13" y="33" width="15" height="4" rx="2" fill="#CBD2E0" opacity=".3"/>
      </svg>
      <p class="empty-title">No shape selected</p>
      <p class="empty-sub">Click any shape on the slide to see styling options</p>
    </div>

    <!-- Shape banner -->
    <div id="shape-banner" class="hidden">
      <div class="banner-icon-wrap"><span id="shape-icon"></span></div>
      <div class="banner-text">
        <strong id="shape-type-label"></strong>
        <span id="shape-name"></span>
      </div>
      <span id="shape-count-badge" class="hidden"></span>
    </div>

    <!-- Unsupported -->
    <div id="unsupported-state" class="hidden">
      <p class="unsupported-msg">This shape type doesn't support styling via this panel.</p>
    </div>

    <!-- ── Degree of Integration (fill) ──────────────── -->
    <section id="section-fill" class="hidden">
      <div class="section-hdr">
        <h3>Degree of Integration</h3>
      </div>
      <div id="swatches-fill"></div>
    </section>

    <!-- ── Border ─────────────────────────────────────── -->
    <section id="section-border" class="hidden">
      <div class="section-hdr">
        <h3 id="border-heading">Border</h3>
      </div>
      <div id="swatches-border"></div>

      <span class="sub-label" style="margin-top:10px;">Weight</span>
      <div class="chip-row">
        <button class="chip-btn" data-weight="0.75">0.75pt</button>
        <button class="chip-btn" data-weight="1.5">1.5pt</button>
        <button class="chip-btn" data-weight="3">3pt</button>
        <button class="chip-btn" data-weight="6">6pt</button>
      </div>

      <span class="sub-label">Style</span>
      <div class="chip-row">
        <button class="chip-btn" data-dash="solid">—— Solid</button>
        <button class="chip-btn" data-dash="dash">– – Dash</button>
        <button class="chip-btn" data-dash="roundDot">··· Dot</button>
      </div>
    </section>

    <!-- ── Line ends ──────────────────────────────────── -->
    <section id="section-line-ends" class="hidden">
      <div class="section-hdr"><h3>Line Ends</h3></div>
      <div class="line-ends-grid">
        <div>
          <span class="sub-label">Start</span>
          <select id="line-start">
            <option value="none">None</option>
            <option value="arrow">Arrow ▶</option>
            <option value="openArrow">Open Arrow</option>
            <option value="diamond">Diamond ◆</option>
            <option value="oval">Oval ●</option>
          </select>
        </div>
        <div>
          <span class="sub-label">End</span>
          <select id="line-end">
            <option value="none">None</option>
            <option value="arrow">Arrow ▶</option>
            <option value="openArrow">Open Arrow</option>
            <option value="diamond">Diamond ◆</option>
            <option value="oval">Oval ●</option>
          </select>
        </div>
      </div>
      <button class="apply-ends-btn" id="btn-apply-ends">Apply Line Ends</button>
    </section>

    <!-- ── Text Color ─────────────────────────────────── -->
    <section id="section-text" class="hidden">
      <div class="section-hdr"><h3>Text Color</h3></div>
      <div id="swatches-text"></div>
    </section>

  </div><!-- /main-content -->

  <!-- ══════════ EDIT PANEL ══════════ -->
  <div id="edit-panel" class="hidden" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="ep-header">
      <button class="ep-back-btn" id="edit-back-btn" title="Back">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M6.5 1.5L2.5 5l4 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span id="edit-panel-title">Edit Colors</span>
    </div>
    <div id="edit-panel-body"></div>
  </div>

  <!-- ── Status bar ─────────────────────────────────────── -->
  <div id="status-bar"><span id="status"></span></div>

</div><!-- /app -->
<script src="taskpane.js"></script>
</body>
</html>
