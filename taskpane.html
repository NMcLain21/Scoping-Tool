<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Scoping Tool</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
<div id="app">

  <!-- ── Empty state ── -->
  <div id="empty-state">
    <div class="empty-icon">◻</div>
    <p>Select a shape on the slide to begin styling</p>
  </div>

  <!-- ── Shape banner ── -->
  <div id="shape-banner" class="hidden">
    <span id="shape-icon"></span>
    <div class="banner-text">
      <strong id="shape-type-label"></strong>
      <span id="shape-name"></span>
    </div>
    <span id="shape-count-badge" class="hidden"></span>
  </div>

  <!-- ── Main styling sections ── -->
  <div id="main-content">

    <!-- ── Fill Color ── -->
    <section id="section-fill" class="hidden">
      <h3>Fill Color</h3>
      <div class="swatch-row-wrapper">
        <div class="swatch-row" id="swatches-fill"></div>
        <button class="edit-palette-btn" data-palette="fill" title="Edit fill palette">✏</button>
      </div>
      <div id="editor-fill" class="inline-editor hidden">
        <div class="inline-editor-inner">
          <div id="palette-list-fill" class="inline-palette-list"></div>
          <div class="inline-add-row">
            <input type="color" id="picker-fill" value="#2E75B6" />
            <input type="text"  id="name-fill"   placeholder="Color name" maxlength="28" />
            <button class="add-color-btn" data-palette="fill">+ Add</button>
          </div>
          <button class="reset-palette-btn" data-palette="fill">↺ Reset to defaults</button>
        </div>
      </div>
    </section>

    <!-- ── Border / Line Style ── -->
    <section id="section-border" class="hidden">
      <h3 id="border-heading">Border</h3>

      <span class="sub-label">Color</span>
      <div class="swatch-row-wrapper">
        <div class="swatch-row" id="swatches-border"></div>
        <button class="edit-palette-btn" data-palette="border" title="Edit border palette">✏</button>
      </div>
      <div id="editor-border" class="inline-editor hidden">
        <div class="inline-editor-inner">
          <div id="palette-list-border" class="inline-palette-list"></div>
          <div class="inline-add-row">
            <input type="color" id="picker-border" value="#1F3864" />
            <input type="text"  id="name-border"   placeholder="Color name" maxlength="28" />
            <button class="add-color-btn" data-palette="border">+ Add</button>
          </div>
          <button class="reset-palette-btn" data-palette="border">↺ Reset to defaults</button>
        </div>
      </div>

      <span class="sub-label">Weight</span>
      <div class="option-row">
        <button class="opt-btn" data-weight="0.75">0.75pt</button>
        <button class="opt-btn" data-weight="1.5">1.5pt</button>
        <button class="opt-btn" data-weight="3">3pt</button>
        <button class="opt-btn" data-weight="6">6pt</button>
      </div>

      <span class="sub-label">Style</span>
      <div class="option-row">
        <button class="opt-btn" data-dash="solid">—— Solid</button>
        <button class="opt-btn" data-dash="dash">– – Dash</button>
        <button class="opt-btn" data-dash="dot">··· Dot</button>
      </div>
    </section>

    <!-- ── Line Ends (Line shapes only) ── -->
    <section id="section-line-ends" class="hidden">
      <h3>Line Ends</h3>
      <div class="line-ends-grid">
        <div>
          <span class="sub-label">Start</span>
          <select id="line-start">
            <option value="none">None</option>
            <option value="arrow">Arrow ▶</option>
            <option value="openArrow">Open Arrow</option>
            <option value="diamond">Diamond ◆</option>
            <option value="oval">Oval ●</option>
          </select>
        </div>
        <div>
          <span class="sub-label">End</span>
          <select id="line-end">
            <option value="none">None</option>
            <option value="arrow">Arrow ▶</option>
            <option value="openArrow">Open Arrow</option>
            <option value="diamond">Diamond ◆</option>
            <option value="oval">Oval ●</option>
          </select>
        </div>
      </div>
      <div class="option-row" style="margin-top:8px;">
        <button class="opt-btn primary-btn" id="btn-apply-ends">Apply Line Ends</button>
      </div>
    </section>

    <!-- ── Text Color ── -->
    <section id="section-text" class="hidden">
      <h3>Text Color</h3>
      <div class="swatch-row-wrapper">
        <div class="swatch-row" id="swatches-text"></div>
        <button class="edit-palette-btn" data-palette="text" title="Edit text palette">✏</button>
      </div>
      <div id="editor-text" class="inline-editor hidden">
        <div class="inline-editor-inner">
          <div id="palette-list-text" class="inline-palette-list"></div>
          <div class="inline-add-row">
            <input type="color" id="picker-text" value="#000000" />
            <input type="text"  id="name-text"   placeholder="Color name" maxlength="28" />
            <button class="add-color-btn" data-palette="text">+ Add</button>
          </div>
          <button class="reset-palette-btn" data-palette="text">↺ Reset to defaults</button>
        </div>
      </div>
    </section>

    <!-- ── Unsupported notice ── -->
    <div id="unsupported-state" class="hidden">
      <p class="unsupported-msg">This shape type doesn't support styling via this panel.</p>
    </div>

  </div><!-- /#main-content -->

  <!-- ── Status bar ── -->
  <div id="status-bar"><span id="status"></span></div>

</div><!-- /#app -->
<script src="taskpane.js"></script>
</body>
</html>
