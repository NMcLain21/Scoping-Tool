<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Scoping Tool</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
<div id="app">

  <!-- ── Empty state ── -->
  <div id="empty-state">
    <div class="empty-icon">◻</div>
    <p>Select a shape on the slide to begin styling</p>
  </div>

  <!-- ── Shape banner ── -->
  <div id="shape-banner" class="hidden">
    <span id="shape-icon"></span>
    <div class="banner-text">
      <strong id="shape-type-label"></strong>
      <span id="shape-name"></span>
    </div>
    <span id="shape-count-badge" class="hidden"></span>
  </div>

  <!-- ── Main styling sections ── -->
  <div id="main-content">

    <!-- Fill Color -->
    <section id="section-fill" class="hidden">
      <h3>Fill Color</h3>
      <div class="swatch-row" id="swatches-fill"></div>
    </section>

    <!-- Border / Line Style -->
    <section id="section-border" class="hidden">
      <h3 id="border-heading">Border</h3>

      <span class="sub-label">Color</span>
      <div class="swatch-row" id="swatches-border"></div>

      <span class="sub-label">Weight</span>
      <div class="option-row">
        <button class="opt-btn" data-weight="0.75">0.75pt</button>
        <button class="opt-btn" data-weight="1.5">1.5pt</button>
        <button class="opt-btn" data-weight="3">3pt</button>
        <button class="opt-btn" data-weight="6">6pt</button>
      </div>

      <span class="sub-label">Style</span>
      <div class="option-row">
        <button class="opt-btn" data-dash="solid">—— Solid</button>
        <button class="opt-btn" data-dash="dash">– – Dash</button>
        <button class="opt-btn" data-dash="dot">··· Dot</button>
      </div>
    </section>

    <!-- Line Ends (Line shapes only) -->
    <section id="section-line-ends" class="hidden">
      <h3>Line Ends</h3>
      <div class="line-ends-grid">
        <div>
          <span class="sub-label">Start</span>
          <select id="line-start">
            <option value="none">None</option>
            <option value="arrow">Arrow ▶</option>
            <option value="openArrow">Open Arrow</option>
            <option value="diamond">Diamond ◆</option>
            <option value="oval">Oval ●</option>
          </select>
        </div>
        <div>
          <span class="sub-label">End</span>
          <select id="line-end">
            <option value="none">None</option>
            <option value="arrow">Arrow ▶</option>
            <option value="openArrow">Open Arrow</option>
            <option value="diamond">Diamond ◆</option>
            <option value="oval">Oval ●</option>
          </select>
        </div>
      </div>
      <div class="option-row" style="margin-top:8px;">
        <button class="opt-btn primary-btn" id="btn-apply-ends">Apply Line Ends</button>
      </div>
    </section>

    <!-- Text Color -->
    <section id="section-text" class="hidden">
      <h3>Text Color</h3>
      <div class="swatch-row" id="swatches-text"></div>
    </section>

    <!-- Unsupported notice -->
    <div id="unsupported-state" class="hidden">
      <p class="unsupported-msg">This shape type doesn't support styling via this panel.</p>
    </div>

  </div><!-- /#main-content -->

  <!-- ── Palette Editor Panel ── -->
  <div id="palette-panel" class="hidden">

    <div class="palette-header">
      <h3>Edit Color Palette</h3>
      <p class="palette-subtext">Colors here appear in all Fill, Border, and Text sections. Saved automatically.</p>
    </div>

    <!-- Current colors list -->
    <div id="palette-list"></div>

    <!-- Add new color -->
    <div class="add-color-form">
      <span class="sub-label">Add New Color</span>
      <div class="add-color-row">
        <input type="color" id="new-color-picker" value="#2E75B6" title="Pick a color" />
        <input type="text"  id="new-color-name"   placeholder="Name (e.g. Brand Blue)" maxlength="28" />
      </div>
      <div class="option-row">
        <button class="opt-btn primary-btn" id="btn-add-color">+ Add to Palette</button>
        <button class="opt-btn reset-btn"   id="btn-reset-palette">↺ Reset Defaults</button>
      </div>
    </div>

  </div><!-- /#palette-panel -->

  <!-- ── Palette toggle bar (always visible) ── -->
  <div id="palette-toggle-bar">
    <button id="btn-toggle-palette">🎨 Edit Palette</button>
  </div>

  <!-- ── Status bar ── -->
  <div id="status-bar"><span id="status"></span></div>

</div><!-- /#app -->
<script src="taskpane.js"></script>
</body>
</html>
