<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoping Tool</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
<div id="app">

  <!-- ── App header ── -->
  <header id="app-header">
    <div class="header-wordmark">
      <span class="header-logo-dot"></span>
      <span class="header-title">Scoping Tool</span>
    </div>
    <span class="header-sub">APi Group</span>
  </header>

  <!-- ── Empty state ── -->
  <div id="empty-state">
    <div class="empty-illustration">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <rect x="8" y="8" width="36" height="36" rx="5" stroke="#C8D0E0" stroke-width="2" fill="none"/>
        <rect x="17" y="17" width="18" height="18" rx="3" stroke="#C8D0E0" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
      </svg>
    </div>
    <p class="empty-title">No shape selected</p>
    <p class="empty-sub">Click any shape on the slide to begin styling</p>
  </div>

  <!-- ── Shape banner ── -->
  <div id="shape-banner" class="hidden">
    <div class="banner-icon-wrap"><span id="shape-icon"></span></div>
    <div class="banner-text">
      <strong id="shape-type-label"></strong>
      <span id="shape-name"></span>
    </div>
    <span id="shape-count-badge" class="hidden"></span>
  </div>

  <!-- ── Content area ── -->
  <div id="content-area">

    <!-- Main panel -->
    <div id="main-content">

      <!-- Fill Color -->
      <section id="section-fill" class="hidden">
        <h3>Fill Color</h3>
        <div class="swatch-row" id="swatches-fill"></div>
      </section>

      <!-- Border -->
      <section id="section-border" class="hidden">
        <h3 id="border-heading">Border</h3>
        <div class="swatch-row" id="swatches-border"></div>
        <div class="control-group">
          <span class="sub-label">Weight</span>
          <div class="chip-row">
            <button class="chip" data-weight="0.75">0.75pt</button>
            <button class="chip" data-weight="1.5">1.5pt</button>
            <button class="chip" data-weight="3">3pt</button>
            <button class="chip" data-weight="6">6pt</button>
          </div>
        </div>
        <div class="control-group">
          <span class="sub-label">Style</span>
          <div class="chip-row">
            <button class="chip" data-dash="solid">
              <svg width="20" height="6" viewBox="0 0 20 6"><line x1="0" y1="3" x2="20" y2="3" stroke="currentColor" stroke-width="2"/></svg>
              Solid
            </button>
            <button class="chip" data-dash="dash">
              <svg width="20" height="6" viewBox="0 0 20 6"><line x1="0" y1="3" x2="20" y2="3" stroke="currentColor" stroke-width="2" stroke-dasharray="5 3"/></svg>
              Dash
            </button>
            <button class="chip" data-dash="roundDot">
              <svg width="20" height="6" viewBox="0 0 20 6"><line x1="0" y1="3" x2="20" y2="3" stroke="currentColor" stroke-width="2" stroke-dasharray="2 3"/></svg>
              Dot
            </button>
          </div>
        </div>
      </section>

      <!-- Line ends -->
      <section id="section-line-ends" class="hidden">
        <h3>Line Ends</h3>
        <div class="line-ends-grid">
          <div class="line-end-field">
            <span class="sub-label">Start</span>
            <select id="line-start">
              <option value="none">None</option>
              <option value="arrow">Arrow ▶</option>
              <option value="openArrow">Open Arrow</option>
              <option value="diamond">Diamond ◆</option>
              <option value="oval">Oval ●</option>
            </select>
          </div>
          <div class="line-end-field">
            <span class="sub-label">End</span>
            <select id="line-end">
              <option value="none">None</option>
              <option value="arrow">Arrow ▶</option>
              <option value="openArrow">Open Arrow</option>
              <option value="diamond">Diamond ◆</option>
              <option value="oval">Oval ●</option>
            </select>
          </div>
        </div>
        <button class="primary-action-btn" id="btn-apply-ends">Apply Line Ends</button>
      </section>

      <!-- Text Color -->
      <section id="section-text" class="hidden">
        <h3>Text Color</h3>
        <div class="swatch-row" id="swatches-text"></div>
      </section>

      <!-- Unsupported -->
      <div id="unsupported-state" class="hidden">
        <p class="unsupported-msg">This shape type doesn't support styling via this panel.</p>
      </div>

    </div><!-- /main-content -->

    <!-- Edit panel overlay -->
    <div id="edit-panel" class="hidden">
      <div id="edit-panel-header">
        <button id="edit-back-btn" aria-label="Back to styling">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back
        </button>
        <span id="edit-panel-title"></span>
      </div>
      <div id="edit-panel-body"></div>
    </div>

  </div><!-- /content-area -->

  <!-- Status bar -->
  <div id="status-bar"><span id="status"></span></div>

</div>
<script src="taskpane.js"></script>
</body>
</html>
